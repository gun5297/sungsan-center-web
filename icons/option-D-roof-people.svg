<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Option D: 지붕 + 사람들 (센터 + 커뮤니티) -->
  <rect width="64" height="64" rx="14" fill="#FF7854"/>
  <!-- 지붕 (넓고 안정적) -->
  <path d="M10 30 L32 14 L54 30" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 큰 사람 (교사/보호자) -->
  <circle cx="26" cy="36" r="4" fill="#fff"/>
  <path d="M21 50 C21 44, 23 42, 26 42 C29 42, 31 44, 31 50" fill="#fff" opacity="0.9"/>
  <!-- 작은 사람 (아동) -->
  <circle cx="38" cy="38" r="3.2" fill="#fff"/>
  <path d="M34 50 C34 45.5, 35.5 44, 38 44 C40.5 44, 42 45.5, 42 50" fill="#fff" opacity="0.9"/>
</svg>
