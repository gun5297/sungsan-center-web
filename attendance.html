<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>성산지역아동센터 출결</title>
  <link rel="stylesheet" href="attendance.css" />
</head>
<body>

  <!-- 메인 화면: 번호 입력 -->
  <div class="screen" id="screenMain">
    <div class="top-bar">
      <div class="center-name">성산지역아동센터</div>
      <div class="clock" id="clock"></div>
    </div>

    <div class="main-content">
      <div class="greeting" id="greeting">번호를 입력하세요</div>

      <div class="input-display">
        <div class="input-dots" id="inputDots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="input-number" id="inputNumber"></div>
      </div>

      <div class="numpad">
        <button class="num-btn" onclick="pressNum('1')">1</button>
        <button class="num-btn" onclick="pressNum('2')">2</button>
        <button class="num-btn" onclick="pressNum('3')">3</button>
        <button class="num-btn" onclick="pressNum('4')">4</button>
        <button class="num-btn" onclick="pressNum('5')">5</button>
        <button class="num-btn" onclick="pressNum('6')">6</button>
        <button class="num-btn" onclick="pressNum('7')">7</button>
        <button class="num-btn" onclick="pressNum('8')">8</button>
        <button class="num-btn" onclick="pressNum('9')">9</button>
        <button class="num-btn fn-btn" onclick="pressDelete()">지우기</button>
        <button class="num-btn" onclick="pressNum('0')">0</button>
        <button class="num-btn fn-btn confirm-btn" onclick="pressConfirm()">확인</button>
      </div>
    </div>
  </div>

  <!-- 성공 화면 -->
  <div class="screen hidden" id="screenSuccess">
    <div class="success-content">
      <div class="success-icon" id="successIcon">✓</div>
      <div class="success-name" id="successName"></div>
      <div class="success-type" id="successType"></div>
      <div class="success-time" id="successTime"></div>
      <div class="success-sms" id="successSms"></div>
    </div>
  </div>

  <!-- 관리자 화면 (오늘 출결 현황) -->
  <div class="screen hidden" id="screenAdmin">
    <div class="admin-header">
      <button class="admin-back" onclick="showScreen('screenMain')">← 돌아가기</button>
      <h2>오늘의 출결 현황</h2>
      <div class="admin-date" id="adminDate"></div>
    </div>

    <div class="admin-summary" id="adminSummary"></div>
    <div class="admin-list" id="adminList"></div>

    <div class="admin-actions">
      <button class="admin-btn" onclick="exportCSV()">엑셀 다운로드</button>
      <button class="admin-btn danger" onclick="resetToday()">오늘 기록 초기화</button>
    </div>
  </div>

  <!-- 관리자 버튼 (좌하단) -->
  <button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()">관리</button>

  <script src="attendance.js"></script>
</body>
</html>
