<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>승인 대기 - 성산지역아동센터</title>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="auth-page">
    <div class="auth-container">
      <a href="index.html" class="auth-logo">성산<span>지역아동센터</span></a>

      <div class="auth-card">
        <div class="auth-pending">
          <div class="auth-pending-icon">⏳</div>
          <div class="auth-pending-title">승인 대기 중</div>
          <p class="auth-pending-desc">
            관리자의 승인 후 로그인이 가능합니다.<br>
            승인 완료 시 안내드리겠습니다.
          </p>
          <a href="login.html" class="btn-upload" style="display:inline-block;text-align:center;margin-top:16px;" id="logoutBtn">로그아웃 후 돌아가기</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { logout } from './firebase/auth.js';
    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await logout();
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
