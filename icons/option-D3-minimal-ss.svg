<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- D3: 극도로 미니멀 — ㅅㅅ 지붕선 + 사람 둘만 -->
  <rect width="64" height="64" rx="14" fill="#FF7854"/>
  <!-- ㅅㅅ 지붕 (핵심 — 이것만으로 성산+집) -->
  <path d="M10 34 L24 18 L32 26 L40 18 L54 34" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 큰 사람 -->
  <circle cx="26" cy="40" r="3.5" fill="#fff"/>
  <path d="M21.5 52 C21.5 46, 23.5 44, 26 44 C28.5 44, 30.5 46, 30.5 52" fill="#fff" opacity="0.9"/>
  <!-- 작은 사람 -->
  <circle cx="38" cy="41.5" r="2.8" fill="#fff"/>
  <path d="M34.5 52 C34.5 47.5, 36 46, 38 46 C40 46, 41.5 47.5, 41.5 52" fill="#fff" opacity="0.9"/>
</svg>
